# Blueprint builds from repo root using ./Dockerfile (copies apps/api/*).
# In the dashboard, leave Root Directory EMPTY so this Dockerfile is used; or use this Blueprint.
# https://render.com/docs/monorepo-support

services:
  - type: web
    name: kitchencall-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
